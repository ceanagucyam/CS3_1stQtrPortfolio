<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Movie Rating</title>

<style>
body {
    font-family: Arial, sans-serif;
    font-size: 20px;
    background-color: #fbd7e5;
    margin: 0;
    justify-content: center;
    align-items: center;
    min-height: 85vh;
    display: flex;
    padding:10px;
    color: #eb7fb3;
}

.container {
    width: 670px;
    margin: auto;
    padding: 30px;
    background-color: #faf2c2;
    border-radius: 8px;
    border: 1px solid #eb7fb3;
}

h2 { 
    text-align: center;
    margin-bottom: 20px;
}

label {
    display: block;
    margin-top: 10px;
    margin-bottom: 10px;
    font-weight: bold;
}

input, select {
    width: 100%;
    padding: 6px;
    border: 1px solid #eb7fb3;
    border-radius: 4px;
    margin-top: 5px;
    box-sizing: border-box;
}

.stars-container {
    display: flex;
    gap: 5px;
    margin-bottom: 15px;
} 

.stars {
    cursor: pointer;
    filter: grayscale(100%);
}

.button {
    display: block;
    width: 100%;
    padding: 10px;
    background-color: #eb7fb3;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}

.movieList {
    margin-top: 20px;
}

.movie-item {
    background: #ffffff;
    padding: 10px;
    border: 1px solid #eb7fb3;
    border-radius: 4px;
    border-bottom: 1px solid #eb7fb3;
    margin-bottom: 10px;
    font-size: 16px;
}

fieldset {
    margin-bottom: 15px;
    border: 1px solid #eb7fb3;
    padding: 15px;
    border-radius: 5px;
}

legend {
    font-weight: bold;
    padding: 0 10px;
}

label {
    display: block;
    margin-bottom: 10px;
}

input, select, textarea {
    width: 100%;
    padding: 6px;
    border: 1px solid #eb7fb3;
    border-radius: 4px;
    margin-top: 5px;
}   
</style>
</head>

<body>
    <div class="container">
        <h2>Add a Movie </h2>

        <label> Title: </label>
        <input type="text" id="movieTitle" placeholder="Enter movie title: e.g The Notebook">

        <label> Year: </label>
        <input type="number" id="movieYear" placeholder="Enter release year: e.g 2004">


     <label> Genre: </label>
     <select id="movieGenre">
         <option value="">Select Genre</option>
         <option value="Action"> Action </option>
         <option value="Comedy"> Comedy </option>
         <option value="Drama"> Drama </option>
         <option value="Sci-Fi"> Sci-Fi </option>
         <option value="Thriller"> Thriller </option>
         <option value="Fantasy"> Fantasy </option>
         <option value="Romance"> Romance</option>
         <option value="Horror"> Horror </option>
     </select>

     <label> Rating: </label>
        <div class="stars-container">
            <span class="stars">⭐</span>
            <span class="stars">⭐</span>
            <span class="stars">⭐</span>
            <span class="stars">⭐</span>
            <span class="stars">⭐</span>
        </div>

    <button type="button" onclick="addMovie()"> Add Movie </button>

    <div class="movie-list-section">
        <h2>Movie List</h2>
        <div id="movieList"></div>
    </div>

    <button type="button" onclick="resetAll()"> Reset All </button>
</body>

<script>
    let currentRating = 0;

        const stars = document.querySelectorAll(".stars");
        const movieList = document.getElementById("movieList");

    // Star rating click event
        stars.forEach((star, index)=> {
            star.addEventListener("click", () => {
                currentRating = index + 1;

                stars.forEach(s => s.style.filter = "grayscale(100%)"); //Set all stars to grayscale first
                for (let i = 0; i < currentRating; i++) {
                    stars[i].style.filter = "grayscale(0%)";
                }
            });

        });

    // CREATE movie object and save to local storage
    function addMovie() {
     const title = document.getElementById("movieTitle").value;
     const year = document.getElementById("movieYear").value;
     const genre = document.getElementById("movieGenre").value;

     if (!title || !year || currentRating === 0) {
        alert("Please fill in all fields.");
        return;
     }

     let movies = JSON.parse(localStorage.getItem("movies")) || []; // Get array from local storage or create new array if empty

     const movieIndex = movies.findIndex(m => m.title.toLowerCase() === title.toLowerCase());

          // If movie exists, UPDATE by getting average rating
     if (movieIndex !== -1) {
        const oldRating = parseFloat(movies[movieIndex].rating);
        const averageRating = (oldRating + currentRating) / 2;

        movies[movieIndex].year = year;
        movies[movieIndex].genre = genre;
        movies[movieIndex].rating = averageRating.toString();

     } else {

     const newMovie = {
        title: title,
        year: year,
        genre: genre,
        rating: currentRating.toString()
     };
     movies.push(newMovie);
    
     }

    localStorage.setItem("movies", JSON.stringify(movies)); // Stringifed array back to local storage
    
    displayMovies();
    clearForm();

    }

    function displayMovies() { // READ array from local storage and display on page
        const movies = JSON.parse(localStorage.getItem("movies")) || [];
        movieList.innerHTML = "";

        // Loop through each movie and display stars based on rating
        movies.forEach((movie, index) => {
         let starDisplay = "";
            for (let i = 0; i < Math.round(parseFloat(movie.rating)); i++) {
                starDisplay += "⭐";
            }

        // Create div element for each movie and display title, year, genre and rating
            const div = document.createElement("div");
            div.className = "movie-item";
            div.innerHTML = `${movie.title} (${movie.year}) - ${movie.genre}, 
            Rating: ${starDisplay}` + `<button onclick="deleteMovie(${index})">Delete</button>`;

            movieList.appendChild(div);

        });

    }

    // DELETE movie from local storage and UPDATE display
    function deleteMovie(index) {
        let userconfirm = confirm("Are you sure you want to delete?");

        if (userconfirm) {
            let movies = JSON.parse(localStorage.getItem("movies")) || [];
            movies.splice(index, 1);
            localStorage.setItem("movies", JSON.stringify(movies));
            displayMovies();
        }
    }

    // Reset all inputs
    function clearForm() {
        document.getElementById("movieTitle").value = "";
        document.getElementById("movieYear").value = "";
        currentRating = 0;
        stars.forEach(s => s.style.filter = "grayscale(100%)");
    }

    displayMovies();

    function resetAll() {
        if (confirm("Are you sure you want to clear your movie list?")) {
            localStorage.removeItem("movies");
            displayMovies();
        }
    }
    


</script>
